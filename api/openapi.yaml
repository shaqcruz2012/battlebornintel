  # ── Admin (requires X-Admin-Key header) ────────────────────────────────────

  /admin/recompute-scores:
    post:
      tags: [Admin]
      summary: Recompute all IRS scores
      security:
        - AdminKey: []
      responses:
        "200":
          description: Scores recomputed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      companiesScored:
                        type: integer
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /admin/recompute-graph:
    post:
      tags: [Admin]
      summary: Recompute graph metrics and cache
      security:
        - AdminKey: []
      responses:
        "200":
          description: Graph metrics recomputed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      nodesCached:
