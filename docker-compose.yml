services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: battlebornintel
      POSTGRES_USER: bbi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bbi_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbi -d battlebornintel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
